<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/vega@5.20.2"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5.1.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6.17.0"></script>
    <link rel="stylesheet" type="text/css" href="css/styles.css" media="all">
</head>
<body>

    <!-- SECTION 1 -->
    <h1>Wildlife in Australian Cities</h1>
    <p>Intro paragraph...</p>

    <div class="pure-g">
        <div class="pure-u-1-2">
            <div id="chart1"></div>   <!-- dot map -->
        </div>
        <div class="pure-u-1-2">
            <div id="chart2"></div>   <!-- top 10 bar -->
        </div>
    </div>

    <div class="pure-g">
        <div class="pure-u-1-3">
            <div id="chart3"></div>   <!-- donut -->
        </div>
        <div class="pure-u-2-3">
            <div id="chart4"></div>   <!-- area/line -->
        </div>
    </div>

    <!-- SECTION 2 -->
    <h2>When Do They Appear?</h2>
    <div id="chart5"></div>           <!-- heatmap -->

    <!-- SECTION 3 -->
    <h2>Wildlife Incidents in Canberra</h2>
    <div class="pure-g">
        <div class="pure-u-1-2">
            <div id="chart6"></div>   <!-- ACT map -->
        </div>
        <div class="pure-u-1-4">
            <div id="chart7"></div>   <!-- bar -->
        </div>
        <div class="pure-u-1-4">
            <div id="chart8"></div>   <!-- line -->
        </div>
    </div>

    <!-- SECTION 4 -->
    <h2>Melbourne vs Canberra</h2>
    <div id="chart9"></div>           <!-- grouped bar -->

    <!-- SECTION 5 -->
    <h2>Biodiversity Hotspots</h2>
    <div id="chart10"></div>          <!-- choropleth -->

    <script type="text/javascript">
        vegaEmbed('#chart1',  'js/chart1_dot_map.vg.json').catch(console.error);
        vegaEmbed('#chart2',  'js/chart2_top_species.vg.json').catch(console.error);
        vegaEmbed('#chart3',  'js/chart3_donut.vg.json').catch(console.error);
        vegaEmbed('#chart4',  'js/chart4_area_time.vg.json').catch(console.error);
        vegaEmbed('#chart5',  'js/chart5_heatmap.vg.json').catch(console.error);
        vegaEmbed('#chart6',  'js/chart6_act_map.vg.json').catch(console.error);
        vegaEmbed('#chart7',  'js/chart7_incidents_bar.vg.json').catch(console.error);
        vegaEmbed('#chart8',  'js/chart8_incidents_line.vg.json').catch(console.error);
        vegaEmbed('#chart9',  'js/chart9_grouped_bar.vg.json').catch(console.error);
        vegaEmbed('#chart10', 'js/chart10_choropleth.vg.json').catch(console.error);
    </script>
</body>
</html>
